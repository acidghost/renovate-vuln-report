name: Renovate Vulnerability Report
description: Report vulnerabilities in Renovate pull request image updates
inputs:
  report-surface:
    description: "Report surface to publish to: summary or pr-comment"
    required: false
    default: summary
  forge:
    description: "Forge hosting the pull request: github, forgejo, or gitea"
    required: false
    default: github
  forge-api-url:
    description: "Forge API URL, usually ${{ github.api_url }}"
    required: false
    default: ${{ github.api_url }}
  token:
    description: "Forge token used when report-surface is pr-comment"
    required: false
    default: ${{ github.token }}
runs:
  using: composite
  steps:
    - name: Install renovate-vuln-report
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Generate Renovate vulnerability report
      shell: bash
      env:
        FORGE_TOKEN: ${{ inputs.token }}
        RENOVATE_VULN_REPORT_SURFACE: ${{ inputs.report-surface }}
        RENOVATE_VULN_REPORT_FORGE: ${{ inputs.forge }}
        INPUTS_FORGE_API_URL: ${{ inputs.forge-api-url }}
      run: >-
        renovate-vuln-report --forge-api-url "${INPUTS_FORGE_API_URL}"
